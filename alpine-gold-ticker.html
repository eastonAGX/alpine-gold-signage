<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --gold:       #C9A84C;
    --gold-dim:   #8A6D28;
    --text:       #EDE8DE;
    --text-muted: #A09880;
    --up:         #4CAF7A;
    --down:       #E05252;
  }

  html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: transparent;
  }

  .ticker-bar {
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: space-around;
    padding: 0 40px;
    gap: 10px;
  }

  /* RATES badge on the left */
  .ticker-label {
    flex-shrink: 0;
    padding: 10px 24px;
    background: var(--gold);
    font-family: 'Courier New', monospace;
    font-size: 18px;
    font-weight: 700;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: #000;
    border-radius: 6px;
  }

  /* Vertical divider */
  .divider {
    width: 1px;
    height: 80px;
    background: rgba(255,255,255,0.1);
    flex-shrink: 0;
  }

  /* Each rate item */
  .ticker-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    font-family: 'Courier New', monospace;
    flex: 1;
  }

  /* Top row: name + unit */
  .t-header {
    display: flex;
    align-items: baseline;
    gap: 8px;
  }

  .t-name {
    color: var(--text-muted);
    font-size: 18px;
    letter-spacing: 0.06em;
    white-space: nowrap;
  }

  .t-unit {
    color: var(--gold-dim);
    font-size: 14px;
    white-space: nowrap;
  }

  /* Middle: price */
  .t-price {
    color: var(--text);
    font-size: 38px;
    font-weight: 700;
    letter-spacing: 0.02em;
    white-space: nowrap;
  }

  /* Bottom: change */
  .t-change {
    font-size: 18px;
    display: flex;
    align-items: center;
    gap: 6px;
    white-space: nowrap;
  }

  .t-change.up   { color: var(--up); }
  .t-change.down { color: var(--down); }
  .t-change.flat { color: var(--text-muted); }
</style>
</head>
<body>

<div class="ticker-bar" id="ticker-bar"></div>

<script>
  function buildItem(label, unit, price, changePct) {
    var n = parseFloat((changePct || '0').replace('%', ''));
    var dir = n > 0 ? 'up' : n < 0 ? 'down' : 'flat';
    var arrow = n > 0 ? '\u25b2' : n < 0 ? '\u25bc' : '\u25ac';
    return '<div class="ticker-item">'
      + '<div class="t-header">'
      +   '<span class="t-name">' + label + '</span>'
      +   '<span class="t-unit">(' + unit + ')</span>'
      + '</div>'
      + '<span class="t-price">' + price + '</span>'
      + '<span class="t-change ' + dir + '"><span>' + arrow + '</span><span>' + (changePct || '\u2014') + '</span></span>'
      + '</div>';
  }

  function fetchRates() {
    fetch('https://member.upma.org/api/public/rates?t=' + Date.now())
      .then(function(r) { return r.json(); })
      .then(function(data) {
        var goldNum = parseFloat((data.gold_rate || '0').replace(/[$,]/g, ''));
        var goldSpot = '$' + (goldNum * 50).toLocaleString('en-US', { minimumFractionDigits: 2 });

        var items = [
          { label: 'Gold Spot',            unit: '1 oz',      price: goldSpot,           changePct: data.gold_rate_change     },
          { label: 'US Minted Gold Coins', unit: '1 oz',      price: data.gold_rate,     changePct: data.gold_rate_change     },
          { label: 'Gold Dollar',          unit: '1/50 oz',   price: data.gold_rate,     changePct: data.gold_rate_change     },
          { label: 'Goldback',             unit: '1/1000 oz', price: data.goldback_rate, changePct: data.goldback_rate_change },
          { label: 'Silver Dollar',        unit: '1 oz',      price: data.silver_rate,   changePct: data.silver_rate_change  }
        ];

        var divider = '<div class="divider"></div>';
        var html = '<div class="ticker-label">Rates</div>' + divider;
        for (var i = 0; i < items.length; i++) {
          html += buildItem(items[i].label, items[i].unit, items[i].price, items[i].changePct);
          if (i < items.length - 1) html += divider;
        }

        var el = document.getElementById('ticker-bar');
        if (el) el.innerHTML = html;
      })
      .catch(function(e) { console.error(e); });
  }

  fetchRates();
  setInterval(fetchRates, 60000);
</script>
</body>
</html>
