<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700;900&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --gold:       #C9A84C;
    --gold-dim:   #a07830;
    --bg:         #273C3C;
    --text:       #EDE8DE;
    --text-muted: rgba(237,232,222,0.55);
    --up:         #4CAF7A;
    --down:       #E05252;
  }

  html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: var(--bg);
    display: flex;
    flex-direction: column;
    font-family: 'Lato', sans-serif;
  }

  .top-bar {
    width: 100%;
    padding: 1.2vh 3vw;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid rgba(255,255,255,0.08);
  }

  .top-bar-label {
    font-size: clamp(14px, 1.8vw, 26px);
    font-weight: 700;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--gold);
  }

  .top-bar-date {
    font-size: clamp(13px, 1.5vw, 22px);
    font-weight: 400;
    color: var(--text-muted);
    letter-spacing: 0.04em;
  }

  .ticker-bar {
    flex: 1;
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: space-around;
    padding: 0 3vw;
  }

  .divider {
    width: 1px;
    align-self: stretch;
    margin: 2vh 0;
    background: rgba(255,255,255,0.08);
    flex-shrink: 0;
  }

  .ticker-item {
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    gap: 0.4vh;
    flex: 1;
    padding: 0 2vw;
    min-width: 0;
  }

  .t-name {
    color: var(--text-muted);
    font-size: clamp(10px, 1.1vw, 17px);
    font-weight: 400;
    letter-spacing: 0.04em;
    white-space: nowrap;
  }

  .t-unit {
    color: var(--gold-dim);
    font-size: clamp(9px, 0.85vw, 13px);
    font-weight: 400;
    margin-left: 0.4vw;
  }

  .t-price {
    color: var(--text);
    font-size: clamp(18px, 3.2vw, 54px);
    font-weight: 700;
    letter-spacing: -0.01em;
    white-space: nowrap;
    line-height: 1.1;
  }

  .t-change {
    font-size: clamp(10px, 1.1vw, 17px);
    font-weight: 400;
    display: flex;
    align-items: center;
    gap: 0.3vw;
    margin-top: 0.2vh;
    white-space: nowrap;
  }

  .t-change.up   { color: var(--up); }
  .t-change.down { color: var(--down); }
  .t-change.flat { color: var(--text-muted); }
</style>
</head>
<body>

<div class="top-bar">
  <span class="top-bar-label">Alpine Gold Rates</span>
  <span class="top-bar-date" id="rates-date">Loading...</span>
</div>
<div class="ticker-bar" id="ticker-bar"></div>

<script>
  function buildItem(label, unit, price, changePct) {
    var n = parseFloat((changePct || '0').replace('%', ''));
    var dir = n > 0 ? 'up' : n < 0 ? 'down' : 'flat';
    var arrow = n > 0 ? '▲' : n < 0 ? '▼' : '▬';
    return '<div class="ticker-item">'
      + '<div><span class="t-name">' + label + '</span><span class="t-unit">(' + unit + ')</span></div>'
      + '<span class="t-price">' + price + '</span>'
      + '<span class="t-change ' + dir + '">' + arrow + ' ' + (changePct || '—') + '</span>'
      + '</div>';
  }

  function fetchRates() {
    fetch('https://member.upma.org/api/public/rates?t=' + Date.now())
      .then(function(r) { return r.json(); })
      .then(function(data) {
        var goldNum = parseFloat((data.gold_rate || '0').replace(/[$,]/g, ''));
        var goldSpot = '$' + (goldNum * 50).toLocaleString('en-US', { minimumFractionDigits: 2 });

        var divider = '<div class="divider"></div>';
        var html = '';

        html += buildItem('US Minted Gold Coins', '1 oz',      goldSpot,           data.gold_rate_change);
        html += divider;
        html += buildItem('Gold Dollar',          '1/50 oz',   data.gold_rate,     data.gold_rate_change);
        html += divider;
        html += buildItem('Silver Dollar',        '1 oz',      data.silver_rate,   data.silver_rate_change);
        html += divider;
        html += buildItem('Goldback',             '1/1000 oz', data.goldback_rate, data.goldback_rate_change);

        var el = document.getElementById('ticker-bar');
        if (el) el.innerHTML = html;

        var dateEl = document.getElementById('rates-date');
        if (dateEl) dateEl.textContent = 'Updated: ' + data.day_of_rate;
      })
      .catch(function(e) { console.error(e); });
  }

  fetchRates();
  setInterval(fetchRates, 60000);
</script>
</body>
</html>
