<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --gold:       #C9A84C;
    --gold-dim:   #a07830;
    --bg:         #273C3C;
    --text:       #EDE8DE;
    --text-muted: #8FAAAA;
    --up:         #4CAF7A;
    --down:       #E05252;
  }

  html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: var(--bg);
    display: flex;
    flex-direction: column;
  }

  .top-bar {
    width: 100%;
    background: var(--gold);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 40px;
    font-family: 'Courier New', monospace;
  }

  .top-bar-label {
    font-size: 16px;
    font-weight: 700;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: #000;
  }

  .top-bar-date {
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 0.08em;
    color: #000;
    opacity: 0.75;
  }

  .ticker-bar {
    flex: 1;
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: space-around;
    padding: 0 40px;
    gap: 10px;
  }

  .divider {
    width: 1px;
    height: 80px;
    background: rgba(255,255,255,0.15);
    flex-shrink: 0;
  }

  .ticker-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    font-family: 'Courier New', monospace;
    flex: 1;
  }

  .t-header {
    display: flex;
    align-items: baseline;
    gap: 8px;
  }

  .t-name {
    color: var(--text-muted);
    font-size: 17px;
    letter-spacing: 0.06em;
    white-space: nowrap;
  }

  .t-unit {
    color: var(--gold-dim);
    font-size: 13px;
    white-space: nowrap;
  }

  .t-price {
    color: var(--text);
    font-size: 36px;
    font-weight: 700;
    letter-spacing: 0.02em;
    white-space: nowrap;
  }

  .t-change {
    font-size: 17px;
    display: flex;
    align-items: center;
    gap: 6px;
    white-space: nowrap;
  }

  .t-change.up   { color: var(--up); }
  .t-change.down { color: var(--down); }
  .t-change.flat { color: var(--text-muted); }
</style>
</head>
<body>

<div class="top-bar">
  <span class="top-bar-label">Rates</span>
  <span class="top-bar-date" id="rates-date">Loading...</span>
</div>
<div class="ticker-bar" id="ticker-bar"></div>

<script>
  function buildItem(label, unit, price, changePct) {
    var n = parseFloat((changePct || '0').replace('%', ''));
    var dir = n > 0 ? 'up' : n < 0 ? 'down' : 'flat';
    var arrow = n > 0 ? '\u25b2' : n < 0 ? '\u25bc' : '\u25ac';
    return '<div class="ticker-item">'
      + '<div class="t-header">'
      +   '<span class="t-name">' + label + '</span>'
      +   '<span class="t-unit">(' + unit + ')</span>'
      + '</div>'
      + '<span class="t-price">' + price + '</span>'
      + '<span class="t-change ' + dir + '"><span>' + arrow + '</span><span>' + (changePct || '\u2014') + '</span></span>'
      + '</div>';
  }

  function fetchRates() {
    fetch('https://member.upma.org/api/public/rates?t=' + Date.now())
      .then(function(r) { return r.json(); })
      .then(function(data) {
        var goldNum = parseFloat((data.gold_rate || '0').replace(/[$,]/g, ''));
        var goldSpot = '$' + (goldNum * 50).toLocaleString('en-US', { minimumFractionDigits: 2 });

        var divider = '<div class="divider"></div>';
        var html = '';

        html += buildItem('US Minted Gold Coins', '1 oz',      goldSpot,           data.gold_rate_change);
        html += divider;
        html += buildItem('Gold Dollar',          '1/50 oz',   data.gold_rate,     data.gold_rate_change);
        html += divider;
        html += buildItem('Goldback',             '1/1000 oz', data.goldback_rate, data.goldback_rate_change);
        html += divider;
        html += buildItem('Silver Dollar',        '1 oz',      data.silver_rate,   data.silver_rate_change);

        var el = document.getElementById('ticker-bar');
        if (el) el.innerHTML = html;

        var dateEl = document.getElementById('rates-date');
        if (dateEl) dateEl.textContent = 'Updated: ' + data.day_of_rate;
      })
      .catch(function(e) { console.error(e); });
  }

  fetchRates();
  setInterval(fetchRates, 60000);
</script>
</body>
</html>
