<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --gold:       #C9A84C;
    --gold-dim:   #8A6D28;
    --text:       #EDE8DE;
    --text-muted: #A09880;
    --up:         #4CAF7A;
    --down:       #E05252;
  }

  html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: transparent;
  }

  .ticker-bar {
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: space-around;
    padding: 0 20px;
    overflow: hidden;
  }

  .ticker-label {
    flex-shrink: 0;
    padding: 6px 20px;
    display: flex;
    align-items: center;
    background: var(--gold);
    font-family: 'Courier New', monospace;
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: #000;
    border-radius: 4px;
  }

  .ticker-item {
    display: inline-flex;
    align-items: center;
    gap: 12px;
    font-family: 'Courier New', monospace;
  }

  .t-name  { color: var(--text-muted); font-size: 16px; letter-spacing: 0.06em; }
  .t-unit  { color: var(--gold-dim); font-size: 14px; }
  .t-price { color: var(--text); font-size: 22px; font-weight: 700; letter-spacing: 0.04em; }

  .t-change { font-size: 16px; display: flex; align-items: center; gap: 4px; }
  .t-change.up   { color: var(--up); }
  .t-change.down { color: var(--down); }
  .t-change.flat { color: var(--text-muted); }

  .divider {
    width: 1px;
    height: 30px;
    background: rgba(255,255,255,0.12);
    flex-shrink: 0;
  }
</style>
</head>
<body>

<div class="ticker-bar" id="ticker-bar">
  <!-- populated by JS -->
</div>

<script>
  function buildItem(label, unit, price, changePct) {
    const n = parseFloat((changePct || '0').replace('%', ''));
    const dir = n > 0 ? 'up' : n < 0 ? 'down' : 'flat';
    const arrow = n > 0 ? '▲' : n < 0 ? '▼' : '▬';
    return `
      <div class="ticker-item">
        <span class="t-name">${label}</span>
        <span class="t-unit">(${unit})</span>
        <span class="t-price">${price}</span>
        <span class="t-change ${dir}"><span>${arrow}</span><span>${changePct || '—'}</span></span>
      </div>`;
  }

  function fetchRates() {
    fetch('https://member.upma.org/api/public/rates?t=' + Date.now())
      .then(r => r.json())
      .then(data => {
        const goldNum  = parseFloat((data.gold_rate || '0').replace(/[$,]/g, ''));
        const goldSpot = '$' + (goldNum * 50).toLocaleString('en-US', { minimumFractionDigits: 2 });

        const items = [
          { label: 'Gold Spot',            unit: '1 oz',      price: goldSpot,           changePct: data.gold_rate_change     },
          { label: 'US Minted Gold Coins', unit: '1 oz',      price: data.gold_rate,     changePct: data.gold_rate_change     },
          { label: 'Gold Dollar',          unit: '1/50 oz',   price: data.gold_rate,     changePct: data.gold_rate_change     },
          { label: 'Goldback',             unit: '1/1000 oz', price: data.goldback_rate, changePct: data.goldback_rate_change },
          { label: 'Silver Dollar',        unit: '1 oz',      price: data.silver_rate,   changePct: data.silver_rate_change   },
        ];

        const divider = '<div class="divider"></div>';
        const html = '<div class="ticker-label">Rates</div>' +
          divider +
          items.map(i => buildItem(i.label, i.unit, i.price, i.changePct)).join(divider);

        const el = document.getElementById('ticker-bar');
        if (el) el.innerHTML = html;
      })
      .catch(console.error);
  }

  fetchRates();
  setInterval(fetchRates, 60 * 1000);
</script>
</body>
</html>
